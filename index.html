<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#00F0A0" />

  <!-- SEO -->
  <title>PagoLocal · Paga en Ontinyent y gana en cada compra</title>
  <meta name="description" content="PagoLocal es la app de pago del comercio local de Ontinyent. Paga con QR en tus tiendas de siempre, gana cashback en cada compra y descubre productos locales en el marketplace." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://pagolocal.xyz/" />
  <meta property="og:title" content="PagoLocal · Paga en Ontinyent y gana en cada compra" />
  <meta property="og:description" content="La app de pago del comercio local de Ontinyent. QR, cashback y marketplace local en una sola app." />
  <meta property="og:locale" content="es_ES" />

  <!-- Favicon SVG inline -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2300F0A0'/%3E%3Ctext x='50' y='68' font-family='Georgia,serif' font-size='62' font-weight='700' text-anchor='middle' fill='%231A1A1A'%3EP%3C/text%3E%3C/svg%3E" />

  <!-- Fuentes: Fraunces (display) + Manrope (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,400;9..144,500;9..144,600;9..144,700;9..144,800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Estilos compartidos -->
  <link rel="stylesheet" href="/styles.css" />

  <style>
    /* ============================================================
       Estilos específicos de la landing
       ============================================================ */

    /* HERO */
    .hero {
      position: relative;
      padding: 60px 0 80px;
      overflow: hidden;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 60px;
      align-items: center;
    }
    .hero h1 { margin-bottom: 24px; }
    .hero h1 em {
      font-style: italic;
      font-variation-settings: "SOFT" 100, "opsz" 144;
      color: var(--primary);
      position: relative;
    }
    .hero h1 em::after {
      content: "";
      position: absolute;
      left: 0; right: 0; bottom: 0.08em;
      height: 0.32em;
      background: var(--accent);
      z-index: -1;
      opacity: 0.55;
      border-radius: 4px;
    }
    .hero-lead {
      font-size: 1.2rem;
      color: var(--ink-soft);
      max-width: 540px;
      margin-bottom: 32px;
    }
    .hero-ctas { display: flex; gap: 16px; flex-wrap: wrap; }
    .hero-trust {
      margin-top: 36px;
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .hero-trust-icon {
      width: 36px; height: 36px;
      background: var(--accent-soft);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--primary);
    }
    .hero-trust-icon svg { width: 18px; height: 18px; }

    .hero-visual {
      position: relative;
      aspect-ratio: 1 / 1;
      max-width: 480px;
      margin-left: auto;
    }
    .phone-frame {
      position: absolute;
      inset: 0;
      background: var(--primary);
      border-radius: 56px;
      padding: 14px;
      box-shadow: var(--shadow);
      transform: rotate(-3deg);
    }
    .phone-screen {
      width: 100%; height: 100%;
      background: var(--bg);
      border-radius: 44px;
      padding: 28px 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      overflow: hidden;
      position: relative;
    }
    .phone-screen::before {
      content: "";
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: 90px;
      height: 5px;
      background: var(--line);
      border-radius: 999px;
    }
    .phone-balance {
      margin-top: 24px;
      padding: 18px;
      background: var(--primary);
      color: var(--bg);
      border-radius: 18px;
      position: relative;
      overflow: hidden;
    }
    .phone-balance::after {
      content: "";
      position: absolute;
      right: -40px; top: -40px;
      width: 120px; height: 120px;
      background: var(--accent);
      opacity: 0.18;
      border-radius: 50%;
      filter: blur(20px);
    }
    .phone-balance-label { font-size: 0.75rem; opacity: 0.7; letter-spacing: 0.08em; text-transform: uppercase; position: relative; }
    .phone-balance-value { font-family: "Fraunces", serif; font-size: 2rem; font-weight: 600; margin-top: 4px; color: var(--accent); position: relative; }
    .phone-balance-value small { font-size: 1rem; opacity: 0.7; margin-left: 4px; color: var(--bg); }
    .phone-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      font-size: 0.85rem;
    }
    .phone-row:last-child { border-bottom: 0; }
    .phone-row-icon {
      width: 36px; height: 36px;
      background: var(--accent-soft);
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 1rem;
    }
    .phone-row-main { flex: 1; }
    .phone-row-name { font-weight: 600; color: var(--ink); }
    .phone-row-sub { font-size: 0.75rem; color: var(--muted); }
    .phone-row-amount { font-weight: 600; font-variant-numeric: tabular-nums; }
    .phone-row-cb { color: var(--accent-deep); font-size: 0.75rem; font-weight: 700; }

    .hero-decor {
      position: absolute;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.22;
      filter: blur(70px);
      top: 8%;
      left: 38%;
      z-index: -1;
    }

    @media (max-width: 880px) {
      .hero { padding: 40px 0 60px; }
      .hero-grid { grid-template-columns: 1fr; gap: 50px; }
      .hero-visual { max-width: 320px; margin: 0 auto; }
    }

    /* SECCIÓN GENÉRICA */
    section { padding: 90px 0; }
    @media (max-width: 700px) { section { padding: 60px 0; } }

    .section-head {
      max-width: 700px;
      margin-bottom: 60px;
    }
    .section-head h2 { margin-bottom: 16px; }
    .section-head p { font-size: 1.1rem; color: var(--ink-soft); }

    /* CÓMO FUNCIONA — 3 pasos */
    .how-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .step {
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      position: relative;
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    }
    .step:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
      border-color: var(--accent);
    }
    .step-num {
      position: absolute;
      top: 24px; right: 28px;
      font-family: "Fraunces", serif;
      font-size: 3rem;
      font-weight: 600;
      color: var(--line);
      line-height: 1;
    }
    .step-icon {
      width: 56px; height: 56px;
      background: var(--accent-soft);
      color: var(--primary);
      border-radius: 16px;
      display: grid;
      place-items: center;
      margin-bottom: 28px;
    }
    .step-icon svg { width: 28px; height: 28px; stroke-width: 1.6; }
    .step h3 { margin-bottom: 10px; }
    .step p { margin: 0; color: var(--ink-soft); }

    @media (max-width: 880px) {
      .how-grid { grid-template-columns: 1fr; }
    }

    /* DÓNDE USAR — mosaico */
    .where-bg { background: var(--bg-card); }
    .where-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }
    .where-card {
      padding: 32px 24px;
      border-radius: var(--radius);
      background: var(--bg);
      border: 1px solid var(--line);
      transition: all .2s ease;
    }
    .where-card:hover {
      border-color: var(--primary);
      transform: translateY(-3px);
    }
    .where-emoji {
      font-size: 2.2rem;
      margin-bottom: 14px;
      display: block;
    }
    .where-card h3 { font-family: "Manrope", sans-serif; font-size: 1.05rem; margin-bottom: 6px; letter-spacing: -0.01em; }
    .where-card p { font-size: 0.9rem; margin: 0; color: var(--muted); }

    @media (max-width: 880px) { .where-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .where-grid { grid-template-columns: 1fr; } }

    /* PARA COMERCIOS */
    .merchants {
      background: var(--primary);
      color: var(--bg);
      border-radius: var(--radius-lg);
      padding: 70px 60px;
      position: relative;
      overflow: hidden;
    }
    .merchants::before {
      content: "";
      position: absolute;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.2;
      filter: blur(80px);
      top: -100px; right: -80px;
    }
    .merchants-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
      position: relative;
    }
    .merchants h2 { color: var(--bg); margin-bottom: 20px; }
    .merchants .eyebrow {
      background: rgba(0,240,160,0.18);
      color: var(--accent);
    }
    .merchants-lead { color: rgba(255,255,255,0.85); font-size: 1.1rem; margin-bottom: 28px; }
    .merchants-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 26px;
      background: var(--accent);
      color: var(--ink);
      border-radius: 999px;
      font-weight: 700;
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .merchants-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,240,160,0.35);
    }
    .merchants-list {
      list-style: none;
      padding: 0; margin: 0;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .merchants-list li {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .merchants-list svg {
      flex-shrink: 0;
      width: 24px; height: 24px;
      color: var(--accent);
      margin-top: 2px;
    }
    .merchants-list strong { display: block; margin-bottom: 4px; }
    .merchants-list span { color: rgba(255,255,255,0.75); font-size: 0.95rem; }

    @media (max-width: 880px) {
      .merchants { padding: 50px 32px; }
      .merchants-grid { grid-template-columns: 1fr; gap: 40px; }
    }

    /* SEGURIDAD */
    .security-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 28px;
    }
    .security-item { text-align: left; }
    .security-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: var(--bg-card);
      border: 1px solid var(--line);
      color: var(--primary);
      display: grid;
      place-items: center;
      margin-bottom: 18px;
    }
    .security-icon svg { width: 22px; height: 22px; stroke-width: 1.7; }
    .security-item h3 { font-family: "Manrope", sans-serif; font-size: 1rem; margin-bottom: 6px; }
    .security-item p { font-size: 0.92rem; margin: 0; }

    @media (max-width: 880px) { .security-grid { grid-template-columns: repeat(2, 1fr); gap: 32px; } }
    @media (max-width: 480px) { .security-grid { grid-template-columns: 1fr; } }

    /* FAQ */
    .faq-bg { background: var(--bg-card); }
    .faq-list { max-width: 780px; margin: 0 auto; }
    .faq-item {
      border-bottom: 1px solid var(--line);
      padding: 8px 0;
    }
    .faq-item summary {
      list-style: none;
      cursor: pointer;
      padding: 20px 0;
      font-weight: 600;
      font-size: 1.05rem;
      color: var(--ink);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      transition: color .15s ease;
    }
    .faq-item summary:hover { color: var(--primary); }
    .faq-item summary::-webkit-details-marker { display: none; }
    .faq-item summary::after {
      content: "+";
      font-family: "Fraunces", serif;
      font-size: 1.6rem;
      font-weight: 300;
      color: var(--muted);
      transition: transform .2s ease;
      line-height: 1;
    }
    .faq-item[open] summary::after { transform: rotate(45deg); color: var(--primary); }
    .faq-answer {
      padding: 0 0 24px;
      color: var(--ink-soft);
      max-width: 680px;
    }
    .faq-answer p { margin: 0 0 12px; }
    .faq-answer p:last-child { margin: 0; }
    .faq-answer a { color: var(--primary); text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 3px; }

    /* CTA FINAL */
    .cta-final {
      text-align: center;
      padding: 100px 0;
    }
    .cta-final h2 { max-width: 640px; margin: 0 auto 20px; }
    .cta-final p { font-size: 1.1rem; max-width: 560px; margin: 0 auto 36px; }
    .cta-final .hero-ctas { justify-content: center; }
  </style>
</head>

    <div class="container">
      <div class="section-head">
        <span class="eyebrow" data-i18n="where.eyebrow"></span>
        <h2 data-i18n="where.title"></h2>

      </div>
      <div class="where-grid">

    val: {},
    en:  {}

  /* ==============================================================
     APLICAR TRADUCCIONES
     ============================================================== */
  let currentLang = 'es';

  function t(key) {
    const path = key.split('.');
    let val = I18N[currentLang];
    for (const p of path) val = val && val[p];
    if (val === undefined || val === null || val === '') {
      val = I18N.es;
      for (const p of path) val = val && val[p];
    }
    return val ?? '';
  }

  function applyLang() {
    document.documentElement.lang = currentLang === 'val' ? 'ca' : currentLang;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = t(el.dataset.i18n);
    });
    document.querySelectorAll('[data-i18n-html]').forEach(el => {
      el.innerHTML = t(el.dataset.i18nHtml);
    });
    document.querySelectorAll('.lang-switch button').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === currentLang);
    });
  }

  document.querySelectorAll('.lang-switch button').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.disabled) return;
      currentLang = btn.dataset.lang;
      applyLang();
    });
  });

  applyLang();

  /* ==============================================================
     BOTONES DE DESCARGA
     ============================================================== */
  document.querySelectorAll('[data-action="download"]').forEach(btn => {
    const platform = btn.dataset.platform;
    const link = APP_LINKS[platform];
    if (link) {
      btn.setAttribute('href', link);
      btn.setAttribute('target', '_blank');
      btn.setAttribute('rel', 'noopener');
      btn.classList.add('live');
    } else {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        openModal();
      });
    }
  });

  /* ==============================================================
     MODAL
     ============================================================== */
  const modal = document.getElementById('modalDownload');
  function openModal()  { modal.classList.add('open');    document.body.style.overflow = 'hidden'; }
  function closeModal() { modal.classList.remove('open'); document.body.style.overflow = ''; }
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  /* ==============================================================
     MENÚ MÓVIL
     ============================================================== */
  document.getElementById('menuToggle').addEventListener('click', () => {
    document.getElementById('navLinks').classList.toggle('open');
  });
  document.querySelectorAll('#navLinks a').forEach(a => {
    a.addEventListener('click', () => document.getElementById('navLinks').classList.remove('open'));
  });

  document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
