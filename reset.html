<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#F5F7FB" />
  <meta name="color-scheme" content="light" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Restablecer contraseña — PagoLocal</title>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%231A1A2E'/%3E%3Cpath d='M55 18 L29 56 h17 l-5 26 27-42 H51 l4-22 z' fill='%23F5C842'/%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/styles.css" />

  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--s-xl);
      background: var(--bg);
      position: relative;
      overflow-x: hidden;
    }
    /* Glow dorado suave decorativo */
    body::before {
      content: "";
      position: absolute;
      top: -200px;
      right: -200px;
      width: 500px;
      height: 500px;
      background: var(--accent);
      opacity: 0.08;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 0;
    }

    /* Card sobre fondo claro */
    .reset-card {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 40px 36px;
      box-shadow: var(--shadow);
      position: relative;
      z-index: 1;
    }
    .reset-header {
      text-align: center;
      margin-bottom: var(--s-xxl);
    }
    /* Logo grande: círculo oscuro con rayo dorado (réplica del icono Play Store) */
    .reset-logo {
      width: 72px;
      height: 72px;
      background: var(--dark-bg);
      border-radius: var(--r-full);
      display: inline-grid;
      place-items: center;
      color: var(--accent-bright);
      margin-bottom: var(--s-xl);
      box-shadow: 0 8px 20px rgba(26, 26, 46, 0.15);
    }
    .reset-logo svg {
      width: 36px;
      height: 36px;
      filter: drop-shadow(0 0 8px rgba(245, 200, 66, 0.5));
    }
    .reset-card h1 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      margin-bottom: var(--s-xs);
      color: var(--text);
    }
    .reset-header p {
      color: var(--muted);
      font-size: 0.95rem;
      margin: 0;
    }
    /* Badge contexto */
    .badge-context {
      display: inline-block;
      margin-top: var(--s-md);
      padding: 5px 12px;
      background: var(--accent-tint);
      border: 1px solid rgba(176, 121, 8, 0.20);
      border-radius: var(--r-full);
      color: var(--accent);
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .field { margin-bottom: var(--s-lg); }
    label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: var(--s-sm);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      color: var(--text);
      padding: 14px var(--s-lg);
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .hint {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: var(--s-sm);
    }
    /* Botón primary */
    button[type="submit"] {
      width: 100%;
      background: var(--accent);
      color: var(--white);
      border: none;
      border-radius: var(--r-md);
      padding: 15px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: var(--s-lg);
      transition: background .15s ease, transform .1s ease, box-shadow .15s ease;
      font-family: inherit;
    }
    button[type="submit"]:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(176, 121, 8, 0.30);
    }
    button[type="submit"]:active:not(:disabled) { transform: translateY(0); }
    button[type="submit"]:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Alerts */
    .alert {
      border-radius: var(--r-md);
      padding: 14px var(--s-lg);
      font-size: 0.88rem;
      margin-bottom: var(--s-lg);
      display: none;
      line-height: 1.5;
      border: 1px solid;
    }
    .alert.show { display: block; }
    .alert.error {
      background: var(--red-dim);
      border-color: rgba(220, 38, 38, 0.4);
      color: var(--red);
    }
    .alert.success {
      background: var(--accent-tint);
      border-color: rgba(176, 121, 8, 0.4);
      color: var(--accent);
    }

    .reset-footer {
      text-align: center;
      margin-top: var(--s-xl);
      font-size: 0.88rem;
      color: var(--text-dim);
    }
    .reset-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }
    .reset-footer a:hover { text-decoration: underline; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="reset-card">
    <div class="reset-header">
      <div class="reset-logo">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
      </div>
      <h1 id="title">Restablecer contraseña</h1>
      <p id="subtitle">Introduce tu nueva contraseña.</p>
      <div id="badge-context" class="badge-context hidden">Cuenta de comercio</div>
    </div>

    <div id="alert" class="alert"></div>

    <form id="reset-form">
      <div class="field">
        <label for="pwd1">Nueva contraseña</label>
        <input type="password" id="pwd1" minlength="6" required autocomplete="new-password" />
        <div class="hint">Mínimo 6 caracteres.</div>
      </div>

      <div class="field">
        <label for="pwd2">Confirma tu nueva contraseña</label>
        <input type="password" id="pwd2" minlength="6" required autocomplete="new-password" />
      </div>

      <button type="submit" id="btn-submit">Restablecer contraseña</button>
    </form>

    <div class="reset-footer">
      <p>¿Recuerdas tu contraseña? <a href="/">Volver al inicio</a></p>
    </div>
  </div>

<script>
/* ==============================================================
   LÓGICA DE RESET — Conecta con el backend de Railway.
   No tocar a menos que el endpoint del backend cambie.
   ============================================================== */
(function(){
  const API_BASE = 'https://localpay-backend-production.up.railway.app';
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  const tipo  = (params.get('tipo') || 'usuario').toLowerCase();
  const esComercio = tipo === 'comercio';

  const endpoint = esComercio
    ? '/api/auth/reset-password-comercio'
    : '/api/auth/reset-password';

  const form        = document.getElementById('reset-form');
  const alertBox    = document.getElementById('alert');
  const titleEl     = document.getElementById('title');
  const subtitle    = document.getElementById('subtitle');
  const badgeCtx    = document.getElementById('badge-context');
  const btn         = document.getElementById('btn-submit');

  if (esComercio) {
    titleEl.textContent  = 'Contraseña de comercio';
    subtitle.textContent = 'Introduce la nueva contraseña con la que vas a iniciar sesión en la app de comercios.';
    badgeCtx.classList.remove('hidden');
  }

  function showAlert(msg, type){
    alertBox.textContent = msg;
    alertBox.className = 'alert show ' + type;
  }

  if(!token){
    form.classList.add('hidden');
    subtitle.textContent = 'Enlace inválido.';
    showAlert('Este enlace no es válido. Solicita un nuevo email de restablecimiento desde la app.', 'error');
    return;
  }

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    const pwd1 = document.getElementById('pwd1').value;
    const pwd2 = document.getElementById('pwd2').value;

    if(pwd1.length < 6){
      showAlert('La contraseña debe tener al menos 6 caracteres.', 'error');
      return;
    }
    if(pwd1 !== pwd2){
      showAlert('Las contraseñas no coinciden.', 'error');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Procesando...';
    alertBox.className = 'alert';

    try {
      const r = await fetch(API_BASE + endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, nueva_password: pwd1 })
      });
      const data = await r.json().catch(()=>({}));

      if(r.ok && data.ok){
        form.classList.add('hidden');
        subtitle.textContent = 'Contraseña actualizada.';
        const msgOk = esComercio
          ? 'Tu contraseña ha sido restablecida correctamente. Ya puedes iniciar sesión en la app de comercios.'
          : 'Tu contraseña ha sido restablecida correctamente. Ya puedes volver a la app e iniciar sesión.';
        showAlert(msgOk, 'success');
      } else {
        const motivo = data.error || 'No se ha podido restablecer la contraseña.';
        const expirado = /expirad|inv[áa]lid|caducad/i.test(motivo);
        showAlert(expirado ? 'Este enlace ha caducado o ya se ha usado. Solicita uno nuevo desde la app.' : motivo, 'error');
        btn.disabled = false;
        btn.textContent = 'Restablecer contraseña';
      }
    } catch(err) {
      showAlert('No se ha podido conectar con el servidor. Comprueba tu conexión e inténtalo de nuevo.', 'error');
      btn.disabled = false;
      btn.textContent = 'Restablecer contraseña';
    }
  });
})();
</script>

</body>
</html>
